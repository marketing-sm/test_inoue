<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3問性格診断</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f8f6;
      --color-border: rgba(0,0,0,0.12);
      --color-border-hover: rgba(0,0,0,0.25);
      --color-text: #1a1a1a;
      --color-text-muted: #6b6b6b;
      --color-text-hint: #9b9b9b;
      --color-purple-light: #EEEDFE;
      --color-purple-mid: #7F77DD;
      --color-purple-dark: #3C3489;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1e;
        --color-surface: #2c2c2e;
        --color-border: rgba(255,255,255,0.12);
        --color-border-hover: rgba(255,255,255,0.25);
        --color-text: #f0f0f0;
        --color-text-muted: #ababab;
        --color-text-hint: #6b6b6b;
        --color-purple-light: #26215C;
        --color-purple-dark: #CECBF6;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-surface);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--color-bg);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    .progress-bar { display: flex; gap: 6px; margin-bottom: 2rem; }
    .prog-dot {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--color-border);
      transition: background 0.3s;
    }
    .prog-dot.active { background: var(--color-purple-mid); }
    .prog-dot.done { background: var(--color-purple-mid); opacity: 0.4; }

    .q-num {
      font-size: 12px; color: var(--color-text-hint);
      letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .q-text {
      font-size: 20px; font-weight: 500;
      line-height: 1.4; margin-bottom: 1.5rem;
    }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: var(--color-bg);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      color: var(--color-text);
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .choice-btn:hover { border-color: var(--color-border-hover); background: var(--color-surface); }
    .choice-btn.selected {
      border-color: var(--color-purple-mid);
      background: var(--color-purple-light);
      color: var(--color-purple-dark);
    }

    .choice-label {
      width: 22px; height: 22px; border-radius: 50%;
      border: 0.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; flex-shrink: 0; opacity: 0.5;
    }
    .choice-btn.selected .choice-label {
      opacity: 1; background: var(--color-purple-mid);
      border-color: var(--color-purple-mid); color: #fff;
    }

    .nav-row { display: flex; justify-content: flex-end; margin-top: 1.5rem; }
    .next-btn {
      background: var(--color-purple-mid); color: #fff;
      border: none; border-radius: var(--radius-md);
      padding: 10px 24px; font-size: 14px; font-weight: 500;
      cursor: pointer; opacity: 0.4; pointer-events: none;
      transition: opacity 0.2s;
    }
    .next-btn.ready { opacity: 1; pointer-events: auto; }
    .next-btn:hover { opacity: 0.85; }

    .result-emoji { font-size: 48px; margin-bottom: 12px; }
    .result-type { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .result-tag {
      display: inline-block;
      background: var(--color-purple-light); color: var(--color-purple-dark);
      font-size: 12px; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px;
    }
    .result-desc {
      font-size: 15px; color: var(--color-text-muted);
      line-height: 1.7; margin-bottom: 1rem;
    }
    .strengths {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem;
    }
    .strength-item {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: 10px 12px; font-size: 13px;
    }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      background: transparent;
      border: 0.5px solid var(--color-border-hover);
      border-radius: var(--radius-md);
      padding: 8px 16px; font-size: 13px;
      color: var(--color-text-muted); cursor: pointer;
      transition: background 0.15s;
    }
    .action-btn:hover { background: var(--color-surface); }
  </style>
</head>
<body>
<div class="card">
  <div class="progress-bar" id="progressBar">
    <div class="prog-dot active" id="dot0"></div>
    <div class="prog-dot" id="dot1"></div>
    <div class="prog-dot" id="dot2"></div>
  </div>

  <div id="questionArea">
    <div class="q-num" id="qNum">質問 1 / 3</div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choices"></div>
    <div class="nav-row"><button class="next-btn" id="nextBtn">次へ →</button></div>
  </div>

  <div id="resultArea" style="display:none;"></div>
</div>

<script>
const questions = [
  {
    text: "週末の理想的な過ごし方は？",
    choices: [
      { label: "A", text: "友達とわいわい出かける", val: "E" },
      { label: "B", text: "家でゆっくり好きなことをする", val: "I" },
      { label: "C", text: "気分で決める — どっちも好き", val: "M" }
    ]
  },
  {
    text: "問題が起きたとき、最初に何をする？",
    choices: [
      { label: "A", text: "論理的に原因を分析する", val: "T" },
      { label: "B", text: "誰かに話を聞いてもらう", val: "F" },
      { label: "C", text: "直感でパッと動いてみる", val: "X" }
    ]
  },
  {
    text: "新しいことを始めるとき、あなたは？",
    choices: [
      { label: "A", text: "計画をしっかり立ててから動く", val: "J" },
      { label: "B", text: "とりあえずやってみて調整する", val: "P" },
      { label: "C", text: "仲間がいれば何でも大丈夫", val: "S" }
    ]
  }
];

const results = {
  ETJ: { emoji: "🌟", type: "カリスマリーダー", tag: "社交派 × 分析家 × 計画型", desc: "人を巻き込む力と論理的な判断力を兼ね備えた天性のリーダー。チームを引っ張りながら確実に目標へ向かいます。", strengths: ["🎯 目標達成力", "🤝 チームビルディング", "💡 問題解決力", "📊 計画立案"] },
  ETP: { emoji: "⚡", type: "アイデアハンター", tag: "社交派 × 分析家 × 自由型", desc: "次々とアイデアを生み出し、人を巻き込みながら実行するエネルギッシュな存在。", strengths: ["💭 発想力", "🚀 行動力", "🗣️ 説得力", "🔄 適応力"] },
  ETS: { emoji: "🏆", type: "頼れる指揮官", tag: "社交派 × 分析家 × 仲間型", desc: "仲間と共に論理的に課題を乗り越えるリーダーシップ型。チームの力を最大化します。", strengths: ["👥 チーム力", "💡 分析力", "🤝 協調性", "🎯 達成力"] },
  EFJ: { emoji: "🌈", type: "ハーモニーメーカー", tag: "社交派 × 共感型 × 計画型", desc: "周囲の気持ちを敏感に読み取り、場の空気を整える達人。人々をハッピーにするプランナー。", strengths: ["❤️ 共感力", "🎉 場の演出", "👐 調和力", "📋 段取り力"] },
  EFP: { emoji: "🎨", type: "自由な情熱家", tag: "社交派 × 共感型 × 自由型", desc: "感情豊かで表現力抜群！人との縁を大切にしながら、インスピレーションのままに生きるタイプ。", strengths: ["🎭 表現力", "💖 情熱", "🌟 独創性", "🤗 親しみやすさ"] },
  EFS: { emoji: "☀️", type: "みんなのムードメーカー", tag: "社交派 × 共感型 × 仲間型", desc: "仲間といるとき最高に輝く太陽のような存在。感情で人をつなぎ、場を温めます。", strengths: ["😄 明るさ", "💞 親和力", "🌈 ポジティブ", "🤗 温かさ"] },
  EXJ: { emoji: "⚔️", type: "直感の実行者", tag: "社交派 × 直感型 × 計画型", desc: "人を巻き込みながら直感で判断し、計画通りに実行するパワフルなタイプ。", strengths: ["⚡ 決断力", "🏃 実行力", "🎯 達成感", "👥 巻き込み力"] },
  EXP: { emoji: "🎲", type: "型破りな冒険家", tag: "社交派 × 直感型 × 自由型", desc: "ノリと勢いで人生を切り開く社交的な冒険家。失敗を恐れず楽しいことに全力で飛び込みます！", strengths: ["🌪️ 行動力", "😎 度胸", "🎭 エンタメ力", "🔥 情熱"] },
  EXS: { emoji: "🎪", type: "仲間と輝く冒険者", tag: "社交派 × 直感型 × 仲間型", desc: "仲間と一緒に直感でどんどん動く、エネルギッシュな行動派。", strengths: ["🌟 活力", "👫 絆力", "⚡ 瞬発力", "🎉 祭り上手"] },
  ITJ: { emoji: "🔬", type: "静かな戦略家", tag: "内省派 × 分析家 × 計画型", desc: "深く考え、緻密に計画する知性派。一人で集中して取り組むことで最高のパフォーマンスを発揮します。", strengths: ["🧠 深い思考力", "📐 緻密さ", "🔍 洞察力", "📚 専門性"] },
  ITP: { emoji: "🛸", type: "自由な探究者", tag: "内省派 × 分析家 × 自由型", desc: "好奇心旺盛で独自の視点を持つ探究者。型にはまらず、知識の海を自由に泳ぎ回ります。", strengths: ["🔭 好奇心", "💡 独自の視点", "🧩 論理思考", "⚙️ 問題解決"] },
  ITS: { emoji: "🔧", type: "縁の下の分析家", tag: "内省派 × 分析家 × 仲間型", desc: "仲間のために論理的にサポートする職人気質。静かにチームを支える頼れる存在。", strengths: ["🛠️ 技術力", "🤝 支援力", "🔍 正確さ", "💪 信頼性"] },
  IFJ: { emoji: "🌸", type: "思いやりの守護者", tag: "内省派 × 共感型 × 計画型", desc: "静かに、でも確実に周囲を支える存在。深い共感力と几帳面さで大切な人を陰ながら守ります。", strengths: ["🌿 思いやり", "🔒 信頼性", "💝 誠実さ", "📝 丁寧さ"] },
  IFP: { emoji: "🦋", type: "夢見るクリエイター", tag: "内省派 × 共感型 × 自由型", desc: "豊かな内面世界を持つ芸術的な魂。自分のペースで深く物事を感じ、独自の世界観を大切にします。", strengths: ["🎼 創造性", "💫 感受性", "🌙 独自の世界観", "🌱 成長思考"] },
  IFS: { emoji: "🌿", type: "静かな絆の守人", tag: "内省派 × 共感型 × 仲間型", desc: "大切な人との絆を静かに、しかし深く育む誠実なタイプ。", strengths: ["💖 深い絆", "🌸 優しさ", "🤝 誠実さ", "🏡 安心感"] },
  IXJ: { emoji: "🧭", type: "孤高のストラテジスト", tag: "内省派 × 直感型 × 計画型", desc: "静かに深く考え、直感を計画に落とし込む孤高の戦略家。内なる羅針盤を信じて着実に歩みます。", strengths: ["🧠 直感力", "🔍 深い洞察", "🗺️ 戦略思考", "⚓ 自立心"] },
  IXP: { emoji: "🌙", type: "マイペースな哲学者", tag: "内省派 × 直感型 × 自由型", desc: "自分のリズムで世界を深く観察する思索家。急かされることなく、内なる真実を静かに追い求めます。", strengths: ["🔮 洞察力", "🌙 内省力", "🦅 独立心", "🌱 成長志向"] },
  IXS: { emoji: "🧩", type: "深い絆の直感人", tag: "内省派 × 直感型 × 仲間型", desc: "少数の深い仲間と直感でつながる、静かで温かいタイプ。", strengths: ["💎 深い絆", "🔮 直感力", "🤝 信頼感", "🌙 静けさ"] },
  MTJ: { emoji: "🎯", type: "バランス型リーダー", tag: "柔軟派 × 分析家 × 計画型", desc: "状況に応じて外向き・内向きを切り替えられる柔軟なリーダー。論理と計画で着実に目標を達成します。", strengths: ["⚖️ バランス感覚", "📊 分析力", "🎯 目標設定", "🔄 適応力"] },
  MTP: { emoji: "🌊", type: "自由な発明家", tag: "柔軟派 × 分析家 × 自由型", desc: "どんな状況でも新しいアプローチを見つけ出す天才肌。自由に論理的に動きます。", strengths: ["💡 革新力", "🛠️ 問題解決", "🌀 柔軟性", "🔮 先見性"] },
  MTS: { emoji: "🧲", type: "万能の調整役", tag: "柔軟派 × 分析家 × 仲間型", desc: "論理と仲間力を活かして場を最適化する万能型コーディネーター。", strengths: ["🎨 状況対応力", "⚡ 判断力", "🔄 柔軟性", "📐 計画力"] },
  MFJ: { emoji: "🌺", type: "温かいまとめ役", tag: "柔軟派 × 共感型 × 計画型", desc: "誰とでも自然に打ち解け、感情に寄り添いながら場をまとめる天然のコーディネーター。", strengths: ["🤝 協調性", "💗 共感力", "📅 段取り力", "🌟 人望"] },
  MFP: { emoji: "🎪", type: "楽しさの伝道師", tag: "柔軟派 × 共感型 × 自由型", desc: "どこにいても場を明るくする自然体のムードメーカー。感情と直感で人生を楽しみ尽くします！", strengths: ["😄 明るさ", "🎉 エネルギー", "💞 親和力", "🌈 ポジティブ"] },
  MFS: { emoji: "🌻", type: "仲間思いの太陽", tag: "柔軟派 × 共感型 × 仲間型", desc: "仲間のために笑顔を絶やさず動き回る、みんなの太陽。", strengths: ["☀️ 陽気さ", "💖 思いやり", "👫 仲間力", "🌸 温かさ"] },
  MXJ: { emoji: "🎠", type: "直感の調整者", tag: "柔軟派 × 直感型 × 計画型", desc: "直感と計画を巧みに使い分けながら状況を整える器用なタイプ。", strengths: ["🎨 状況対応", "⚡ 直感力", "📐 計画性", "🔄 柔軟性"] },
  MXP: { emoji: "🌀", type: "自由な風来坊", tag: "柔軟派 × 直感型 × 自由型", desc: "風のように自由に、直感のままに生きる自由人。変化を楽しみながら流れに乗ります。", strengths: ["🌊 適応力", "🎯 直感力", "🦁 自由精神", "✨ 自然体"] },
  MXS: { emoji: "🎶", type: "仲間と旅する自由人", tag: "柔軟派 × 直感型 × 仲間型", desc: "仲間と直感で動き、どんな道でも楽しんでしまう無敵のタイプ。", strengths: ["🎉 楽天性", "👥 仲間力", "⚡ 直感力", "🌈 冒険心"] }
};

let answers = [];
let current = 0;

function getKey() { return answers.join(''); }

function render() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `質問 ${current + 1} / 3`;
  document.getElementById('qText').textContent = q.text;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (answers[current] === c.val ? ' selected' : '');
    btn.innerHTML = `<span class="choice-label">${c.label}</span><span>${c.text}</span>`;
    btn.onclick = () => {
      answers[current] = c.val;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('nextBtn').classList.add('ready');
    };
    choicesEl.appendChild(btn);
  });
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = current < 2 ? '次へ →' : '診断する ✨';
  nextBtn.className = 'next-btn' + (answers[current] !== undefined ? ' ready' : '');
  updateProgress();
}

function updateProgress() {
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = 'prog-dot' + (i < current ? ' done' : i === current ? ' active' : '');
  }
}

function showResult() {
  const key = getKey();
  const r = results[key] || results['MFP'];
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  const area = document.getElementById('resultArea');
  area.style.display = 'block';
  area.innerHTML = `
    <div class="result-emoji">${r.emoji}</div>
    <div class="result-type">${r.type}</div>
    <div class="result-tag">${r.tag}</div>
    <div class="result-desc">${r.desc}</div>
    <div class="strengths">${r.strengths.map(s => `<div class="strength-item">${s}</div>`).join('')}</div>
    <div class="action-row">
      <button class="action-btn" onclick="restart()">↩ もう一度やる</button>
    </div>
  `;
}

document.getElementById('nextBtn').onclick = () => {
  if (answers[current] === undefined) return;
  if (current < 2) { current++; render(); }
  else { showResult(); }
};

function restart() {
  answers = []; current = 0;
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('progressBar').style.display = 'flex';
  document.getElementById('resultArea').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
